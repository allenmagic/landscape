name: build and release

on:
  push:
    tags:
      - '*'
    branches:
      - 'build'

env:
  sccache_version: 'v0.12.0'

jobs:
  linux-musl-build:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/build'
    runs-on: ubuntu-24.04-arm
    container:
      image: ghcr.io/allenmagic/landscape:build_base_musl_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-musl
          components: rustfmt

      - name: Setup sccache
        run: |
          wget -qO- https://github.com/mozilla/sccache/releases/download/${sccache_version}/sccache-${sccache_version}-aarch64-unknown-linux-musl.tar.gz | tar -xzf - -C /usr/local/bin/ --strip-components=1
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/sccache
          key: ${{ runner.os }}-aarch64-unknown-linux-musl-${{ github.sha }}
          restore-keys: ${{ runner.os }}-aarch64-unknown-linux-musl-

      - name: Build Rust binaries
        run: |
          mkdir -p output
          cargo build --release --target aarch64-unknown-linux-musl --no-default-features --features "duckdb-bundled static"
          cp target/aarch64-unknown-linux-musl/release/landscape-webserver output/landscape-webserver-aarch64-musl
          cargo build --release --package landscape-ebpf --bin redirect_pkg_handler --target aarch64-unknown-linux-musl --features static
          cp target/aarch64-unknown-linux-musl/release/redirect_pkg_handler output/redirect_pkg_handler-aarch64-musl

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: landscape-webserver-aarch64-unknown-linux-musl
          path: output/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [linux-musl-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          pattern: landscape-*
          path: output
          merge-multiple: true

      - name: Generate SHASUM
        run: |
          cd output
          sha256sum * > SHASUM256sum.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Auto-generated release from GitHub Actions.
          prerelease: true
          generate_release_notes: true
          files: |
            output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
