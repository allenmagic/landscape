name: build and release

on:
  push:
    tags:
      - '*'
    branches:
      - 'build'

env:
  sccache_version: 'v0.12.0'

jobs:
  linux-musl-build:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/build'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang curl g++ gcc llvm make pkg-config libclang-dev zlib1g-dev zstd wget

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-unknown-linux-musl
          components: rustfmt

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.1

      - name: Setup sccache
        run: |
          wget -qO- https://github.com/mozilla/sccache/releases/download/${sccache_version}/sccache-${sccache_version}-x86_64-unknown-linux-musl.tar.gz | sudo tar -xzf - -C /usr/local/bin/ --strip-components=1
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/sccache
          key: ${{ runner.os }}-aarch64-unknown-linux-musl-${{ github.sha }}
          restore-keys: ${{ runner.os }}-aarch64-unknown-linux-musl-

      - name: Prepare cross toolchain wrappers
        run: |
          sudo install -d /usr/local/bin
          printf '%s\n' '#!/usr/bin/env bash' 'exec zig cc -target aarch64-linux-musl "$@"' \
            | sudo tee /usr/local/bin/zigcc-aarch64-musl >/dev/null
          printf '%s\n' '#!/usr/bin/env bash' 'exec zig c++ -target aarch64-linux-musl "$@"' \
            | sudo tee /usr/local/bin/zigcxx-aarch64-musl >/dev/null
          sudo chmod +x /usr/local/bin/zigcc-aarch64-musl /usr/local/bin/zigcxx-aarch64-musl

      - name: Build Rust binaries
        run: |
          WRAPPER_CC=/usr/local/bin/zigcc-aarch64-musl
          WRAPPER_CXX=/usr/local/bin/zigcxx-aarch64-musl
          export PKG_CONFIG_ALLOW_CROSS=1
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER="$WRAPPER_CC"
          export CC_aarch64_unknown_linux_musl="$WRAPPER_CC"
          export CXX_aarch64_unknown_linux_musl="$WRAPPER_CXX"
          export AR_aarch64_unknown_linux_musl=llvm-ar
          export RANLIB_aarch64_unknown_linux_musl=llvm-ranlib
          mkdir -p output
          cargo build --release --target aarch64-unknown-linux-musl --no-default-features --features "duckdb-bundled static"
          cp target/aarch64-unknown-linux-musl/release/landscape-webserver output/landscape-webserver-aarch64-musl
          cargo build --release --package landscape-ebpf --bin redirect_pkg_handler --target aarch64-unknown-linux-musl --features static
          cp target/aarch64-unknown-linux-musl/release/redirect_pkg_handler output/redirect_pkg_handler-aarch64-musl

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: landscape-webserver-aarch64-unknown-linux-musl
          path: output/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [linux-musl-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          pattern: landscape-*
          path: output
          merge-multiple: true

      - name: Generate SHASUM
        run: |
          cd output
          sha256sum * > SHASUM256sum.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Auto-generated release from GitHub Actions.
          prerelease: true
          generate_release_notes: true
          files: |
            output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
