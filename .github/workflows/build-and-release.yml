name: build and release

on:
  push:
    tags:
      - '*'
    branches:
      - 'build'

env:
  sccache_version: 'v0.12.0'

jobs:
  linux-musl-build:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/build'
    runs-on: ubuntu-24.04-arm     # ← 关键：使用 GitHub 原生 arm64 runner

    container:
      image: alpine:3.23           # ← 在 Alpine 3.23 容器内编译

    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            build-base cmake clang clang-dev clang-static \
            llvm llvm-dev llvm-static \
            linux-headers \
            elfutils-dev libelf-static \
            zlib-dev zlib-static \
            zstd-dev zstd-static \
            pkgconfig make curl wget bash git perl tar gzip xz \
            rust cargo \
            musl-dev \
            openssl-dev openssl-libs-static \
            libbpf-dev bpftool \
            nodejs

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup sccache
        run: |
          wget -qO- https://github.com/mozilla/sccache/releases/download/${sccache_version}/sccache-${sccache_version}-aarch64-unknown-linux-musl.tar.gz \
            | tar -xzf - -C /usr/local/bin/ --strip-components=1
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/sccache
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-aarch64-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-aarch64-musl-

      - name: Build Rust binaries
        env:
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: /usr
          PKG_CONFIG_ALL_STATIC: "1"
          RUSTFLAGS: "-C target-feature=+crt-static"
          CARGO_PROFILE_RELEASE_DEBUG: "false"
          CARGO_PROFILE_RELEASE_STRIP: "true"
        run: |
          mkdir -p output

          # 主程序
          cargo build --release \
            --no-default-features \
            --features "duckdb-bundled static"
          cp target/release/landscape-webserver \
             output/landscape-webserver-aarch64-musl

          # eBPF 子程序
          cargo build --release \
            --package landscape-ebpf \
            --bin redirect_pkg_handler \
            --features static
          cp target/release/redirect_pkg_handler \
             output/redirect_pkg_handler-aarch64-musl

      - name: Verify binaries
        run: |
          file output/landscape-webserver-aarch64-musl
          file output/redirect_pkg_handler-aarch64-musl
          ldd output/landscape-webserver-aarch64-musl || echo "static binary (expected)"

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: landscape-webserver-aarch64-unknown-linux-musl
          path: output/*

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [linux-musl-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          pattern: landscape-*
          path: output
          merge-multiple: true

      - name: Generate SHASUM
        run: |
          cd output
          sha256sum * > SHASUM256sum.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Auto-generated release from GitHub Actions.
          prerelease: true
          generate_release_notes: true
          files: |
            output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
