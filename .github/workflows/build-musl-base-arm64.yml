name: Build ARM64 Musl Base Image

on:
  workflow_dispatch:

jobs:
  build-musl-base-arm64:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ARM64 musl base image
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/${OWNER_LOWER}/landscape:build_base_musl_arm64"

          docker buildx build \
            --platform linux/arm64 \
            -t "$IMAGE_NAME" \
            -f dockerfiles/build-musl/Dockerfile \
            --push \
            .
