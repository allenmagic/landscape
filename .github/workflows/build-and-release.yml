name: build and release

on:
  workflow_dispatch:

env:
  sccache_version: 'v0.12.0'
  RELEASE_NAME: 'landscape-webserver-linux-gnu'

jobs:
  linux-build:
    runs-on: ${{ matrix.settings.host }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-22.04
            architecture: x86_64
            target: x86_64-unknown-linux-gnu

          - host: ubuntu-22.04-arm
            architecture: aarch64
            target: aarch64-unknown-linux-gnu

          - host: ubuntu-22.04
            architecture: x86_64-musl
            target: x86_64-unknown-linux-musl

          - host: ubuntu-22.04-arm
            architecture: aarch64-musl
            target: aarch64-unknown-linux-musl

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang curl gcc llvm make pkg-config libelf-dev libclang-dev zlib1g-dev zstd

      - name: Setup sccache
        run: |
          sccache_arch=${{ matrix.settings.architecture }}
          sccache_arch=${sccache_arch%-musl}
          wget -qO- https://github.com/mozilla/sccache/releases/download/${sccache_version}/sccache-${sccache_version}-${sccache_arch}-unknown-linux-musl.tar.gz \
            | sudo tar -xzf - -C /usr/local/bin/ --strip-components=1
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
          components: rustfmt

      - name: Setup cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/sccache
          key: ${{ runner.os }}-${{ matrix.settings.target }}-${{ github.sha }}
          restore-keys: ${{ runner.os }}-${{ matrix.settings.target }}-

      - name: Build binaries
        run: |
          if [[ "${{ matrix.settings.target }}" == *-musl ]]; then
            LSE_CFLAGS=""
            if [[ "${{ matrix.settings.target }}" == aarch64-* ]]; then
              LSE_CFLAGS="--build-arg LSE_CFLAGS=-march=armv8.1-a"
            fi
            docker build \
              --build-arg RUST_TARGET=${{ matrix.settings.target }} \
              $LSE_CFLAGS \
              -t landscape-build-musl ./dockerfiles/build-musl
            docker run --rm \
              -v $PWD:/landscape \
              landscape-build-musl \
              sh -c "cargo build --release --target ${{ matrix.settings.target }} --features duckdb-bundled && cargo build --release --package landscape-ebpf --bin redirect_pkg_handler --target ${{ matrix.settings.target }}"
          else
            cargo build --release --target ${{ matrix.settings.target }} --features duckdb-bundled
            cargo build --release --package landscape-ebpf --bin redirect_pkg_handler --target ${{ matrix.settings.target }}
          fi
          mkdir -p output
          cp target/${{ matrix.settings.target }}/release/landscape-webserver output/landscape-webserver-${{ matrix.settings.architecture }}
          cp target/${{ matrix.settings.target }}/release/redirect_pkg_handler output/redirect_pkg_handler-${{ matrix.settings.architecture }}

      - name: Export OpenAPI spec
        if: matrix.settings.architecture == 'aarch64'
        run: cargo test -p landscape-webserver export_openapi_json -- --nocapture

      - name: Upload OpenAPI spec
        if: matrix.settings.architecture == 'aarch64'
        uses: actions/upload-artifact@v7
        with:
          name: openapi-spec
          path: landscape-types/openapi.json

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: landscape-webserver-${{ matrix.settings.target }}
          path: output

  build-front:
    needs: linux-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download OpenAPI spec
        uses: actions/download-artifact@v8
        with:
          name: openapi-spec
          path: landscape-types

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Build frontend
        run: |
          mkdir -p output
          pnpm install --frozen-lockfile
          pnpm --filter @landscape-router/types generate

          # Copy Scalar API Reference resources
          mkdir -p landscape-webui/public/scalar
          cp landscape-webui/node_modules/@scalar/api-reference/dist/browser/standalone.js landscape-webui/public/scalar/
          cp landscape-webui/node_modules/@scalar/api-reference/dist/style.css landscape-webui/public/scalar/

          pnpm --filter landscape-webui build
          cd landscape-webui
          mkdir static
          cp -r dist/* static/
          if [ -d public/scalar ]; then
            mkdir -p static/scalar
            cp public/scalar/*.js static/scalar/ 2>/dev/null || true
            cp public/scalar/*.css static/scalar/ 2>/dev/null || true
          fi
          zip -r ../output/static.zip static
        env:
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload frontend
        uses: actions/upload-artifact@v7
        with:
          name: landscape-frontend-none-all
          path: output

  publish:
    runs-on: ubuntu-latest
    needs: [linux-build, build-front]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: landscape-*
          path: .
          merge-multiple: true

      - name: Cleanup non-release files
        run: |
          rm -f output/openapi.json
          ls -lh output/

      - name: Generate SHASUM
        run: |
          cd output
          sha256sum * > SHASUM256sum.txt

      - name: Upload all assets to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: output/*
          file_glob: true
          tag: ${{ env.RELEASE_NAME }}
          overwrite: true
          prerelease: true
          body: |
            Auto-generated build from GitHub Actions.

            Supported targets:
            - `x86_64-unknown-linux-gnu` (Debian / Ubuntu x86_64)
            - `x86_64-unknown-linux-musl` (Alpine / musl-based x86_64)
            - `aarch64-unknown-linux-gnu` (Armbian / Debian / Ubuntu ARM64)
            - `aarch64-unknown-linux-musl` (Alpine / musl-based ARM64)
